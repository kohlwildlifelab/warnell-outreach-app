- name: Install Dependencies
        run: Rscript -e 'install.packages(c("shinylive", "httpuv", "shinydashboard", "shinyscreenshot"))'

name: Deploy Shinylive App
on:
  push:
    branches: [main, master] # Works whether your branch is main or master

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install Dependencies
        run: Rscript -e 'install.packages(c("shinylive", "httpuv"))'

      - name: Export App
        run: Rscript -e 'shinylive::export(".", "site")'

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'site'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
